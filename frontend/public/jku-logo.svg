<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">JKU Logo</title>
  <desc id="desc">Stylized JKU wordmark for the assistant interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="144" height="144" rx="28" fill="url(#bg)"/>
  <text x="80" y="82" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#0f172a">JKU</text>
  <text x="80" y="114" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#334155">AI ASSISTANT</text>
</svg>